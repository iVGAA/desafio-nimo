services:
  postgres:
    image: postgres:16-alpine
    container_name: combustivel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: combustivel
      POSTGRES_PASSWORD: combustivel_dev
      POSTGRES_DB: combustivel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U combustivel -d combustivel_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: combustivel_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://combustivel:combustivel_dev@postgres:5432/combustivel_db?sslmode=disable
      - CORS_ALLOW_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: combustivel_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
